# MessyMash / MossyMesh captive portal nginx
# Serves portal landing (/) + frontend PWA (/app/) on an offline mesh Wi-Fi AP.
# Proxies /api/* to the mesh interop host when it is up (see MESH_API notes below).

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # Required for large mesh asset / model / USB-sneakernet transfers
    client_max_body_size 150M;
    client_body_timeout 300s;
    client_header_timeout 60s;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        application/manifest+json;

    # ------------------------------------------------------------------
    # Mesh AsyncAPI upstream (interop host)
    # - Docker Compose: host.docker.internal → host-gateway (extra_hosts)
    # - Pi network_mode: host: change to 127.0.0.1:8787 (see README)
    # - Port 8787 is the default local interop HTTP surface
    # When host is down, clients receive 502 and stay fully offline.
    # ------------------------------------------------------------------
    upstream mesh_api {
        server host.docker.internal:8787;
        keepalive 8;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Layout:
        #   /usr/share/nginx/html/index.html     -> captive portal
        #   /usr/share/nginx/html/app/           -> MessyMash chess frontend
        root  /usr/share/nginx/html;
        index index.html;

        # ------------------------------------------------------------------
        # Captive portal detection endpoints
        # Returning a redirect (instead of OS "success" payloads) forces the
        # device captive-network UI so users land on MessyMash.
        # ------------------------------------------------------------------

        # Android / Chrome OS / many AOSP forks
        location = /generate_204 {
            return 302 /;
        }
        location = /gen_204 {
            return 302 /;
        }
        location = /generate204 {
            return 302 /;
        }

        # Apple iOS / iPadOS / macOS
        location = /hotspot-detect.html {
            return 302 /;
        }
        location = /library/test/success.html {
            return 302 /;
        }
        location = /success.html {
            return 302 /;
        }

        # Windows NCSI
        location = /connecttest.txt {
            return 302 /;
        }
        location = /ncsi.txt {
            return 302 /;
        }
        location = /redirect {
            return 302 /;
        }

        # Firefox captive portal detection
        location = /success.txt {
            return 302 /;
        }
        location = /canonical.html {
            return 302 /;
        }

        # Amazon Fire / Kindle stubs
        location = /kindle-wifi/wifistub.html {
            return 302 /;
        }
        location = /kindle-wifi/wifiredirect.html {
            return 302 /;
        }

        # Catch-all for well-known connectivity-check path prefixes
        # (DNS is typically hijacked to this node on the mesh AP)
        location ~* ^/(connectivity-check|connectivitycheck|clients3|gstatic) {
            return 302 /;
        }

        # ------------------------------------------------------------------
        # Mesh AsyncAPI reverse proxy → interop host when up
        # Frontend: GET /api/v1/health, POST /api/v1/submit_job
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass http://mesh_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            # Job payloads may include WASM / model bytes
            client_max_body_size 150M;
            add_header Cache-Control "no-store" always;
        }

        # ------------------------------------------------------------------
        # MessyMash chess / mesh frontend PWA
        # ------------------------------------------------------------------
        location /app/ {
            try_files $uri $uri/ /app/index.html;
            expires 1h;
            add_header Cache-Control "public";
        }

        location = /app {
            return 302 /app/;
        }

        # Service worker + manifest must not be long-cached (update loop)
        location ~* ^/app/(sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
            try_files $uri =404;
            add_header Cache-Control "no-cache";
            expires off;
        }

        # ------------------------------------------------------------------
        # Captive portal landing (default)
        # ------------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health probe for compose / orchestrators (not an OS captive check)
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }
}
