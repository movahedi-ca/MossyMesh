# Local captive-portal stack (bind-mount mode).
# Prefer root docker-compose.yml for full multi-stage builds.
#
# From repo root:
#   (cd captive-portal && npm ci && npm run build)
#   (cd frontend && npm ci && npm run build)   # produces dist with base=/app/
#   docker compose -f captive-portal/docker-compose.yml up
#
# Paths in `volumes` are relative to this file's directory.
# /api/* proxies to host.docker.internal:8787 (mesh interop host when up).

services:
  captive-portal:
    image: nginx:1.27-alpine
    container_name: messymash-captive-portal
    ports:
      - "${PORTAL_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - ../frontend/dist:/usr/share/nginx/html/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
