# MessyMash / MossyMesh — local & Pi edge compose
# Serves captive portal landing (/) and chess frontend PWA (/app/).
# nginx client_max_body_size: 150M (see captive-portal/nginx.conf)

services:
  portal:
    build:
      context: .
      dockerfile: captive-portal/Dockerfile
    image: messymash/captive-portal:local
    container_name: messymash-portal
    ports:
      - "${PORTAL_PORT:-80}:80"
    restart: unless-stopped
    # Uncomment for host networking on Raspberry Pi AP setups:
    # network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Bind-mount prebuilt dist dirs for faster Pi iteration
  # Usage: docker compose --profile bind up portal-bind
  portal-bind:
    profiles: ["bind"]
    image: nginx:1.27-alpine
    container_name: messymash-portal-bind
    ports:
      - "${PORTAL_PORT:-80}:80"
    volumes:
      - ./captive-portal/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./captive-portal/dist:/usr/share/nginx/html:ro
      - ./frontend/dist:/usr/share/nginx/html/app:ro
    restart: unless-stopped
