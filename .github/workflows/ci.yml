name: CI

on:
  push:
    branches: [main, 'agent/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend + portal build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [frontend, captive-portal]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: |
          if [ "${{ matrix.package }}" = "frontend" ]; then
            # Served under /app/ by captive-portal nginx
            npx tsc -b && npx vite build --base=/app/
          else
            npm run build
          fi

  # Workspace lib unit tests only (--lib): skips integration/bin tests that are
  # heavier or environment-dependent. Prefer --exclude <crate> (and document in
  # devops/README.md) over continue-on-error if a single crate is known broken.
  rust-lib:
    name: Cargo test (workspace lib)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: workspace-lib

      - name: cargo test --workspace --lib
        run: cargo test --workspace --lib

  docker-portal:
    name: Docker portal image
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build captive-portal image
        run: docker build -f captive-portal/Dockerfile -t messymash/captive-portal:ci .
